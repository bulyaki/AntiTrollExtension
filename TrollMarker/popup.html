<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>TrollMarker Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-icon" src="icons/icon48.png" alt="">
        <div class="brand-copy">
          <h1>TrollMarker</h1>
          <p>Compact controls for Facebook name tracking</p>
        </div>
      </div>
    </header>

    <section class="panel panel-tight">
      <div class="panel-head">
        <div>
          <h2>Appearance</h2>
          <p>Updates apply immediately to new highlights.</p>
        </div>
      </div>

      <div class="appearance-grid">
        <div class="field">
          <span class="field-label">Highlight</span>
          <span class="swatch-control">
            <button type="button" id="bgColorButton" class="color-trigger" aria-label="Highlight color">
              <span class="color-trigger-dot" id="bgColorDot" aria-hidden="true"></span>
            </button>
            <span class="color-value" id="bgColorValue">#FFFF00</span>
          </span>
        </div>

        <div class="field">
          <span class="field-label">Text</span>
          <span class="swatch-control">
            <button type="button" id="textColorButton" class="color-trigger" aria-label="Text color">
              <span class="color-trigger-dot" id="textColorDot" aria-hidden="true"></span>
            </button>
            <span class="color-value" id="textColorValue">#FF0000</span>
          </span>
        </div>

        <div class="field field-wide">
          <label class="field-label" for="bgOpacityInput">Opacity</label>
          <span class="slider-control">
            <input type="range" id="bgOpacityInput" min="0" max="100" value="100">
            <span id="bgOpacityValue" class="slider-value">100%</span>
          </span>
        </div>
      </div>
    </section>

    <div class="segmented-control" role="tablist" aria-label="Popup sections">
      <button type="button" class="tab-button is-active" id="namesTabButton" data-panel="namesPanel"
        aria-controls="namesPanel" aria-selected="true" role="tab">
        Manual
        <span class="count-pill" id="itemCount">0</span>
      </button>
      <button type="button" class="tab-button" id="sourcesTabButton" data-panel="sourcesPanel"
        aria-controls="sourcesPanel" aria-selected="false" role="tab">
        Sources
        <span class="count-pill" id="urlCount">0</span>
      </button>
    </div>

    <section class="panel tab-panel is-active" id="namesPanel" role="tabpanel" aria-labelledby="namesTabButton">
      <div class="panel-head">
        <div>
          <h2>Tracked Names</h2>
          <p>Add a single entry or paste a batch.</p>
        </div>
        <button id="clearAllButton" class="btn btn-secondary btn-small">Clear</button>
      </div>

      <div class="inline-form">
        <input type="text" id="nameInput" placeholder="Name or profile link">
        <button id="addButton" class="btn btn-primary">Add</button>
      </div>

      <button type="button" id="bulkToggleButton" class="inline-toggle" aria-expanded="false"
        aria-controls="bulkComposer">
        Paste multiple names
      </button>

      <div class="bulk-composer" id="bulkComposer" hidden>
        <textarea id="bulkInput" placeholder="One name or link per line"></textarea>
        <div class="composer-actions">
          <button id="bulkAddButton" class="btn btn-accent btn-small">Import List</button>
        </div>
      </div>

      <ul id="nameList" class="item-list"></ul>
    </section>

    <section class="panel tab-panel" id="sourcesPanel" role="tabpanel" aria-labelledby="sourcesTabButton" hidden>
      <div class="panel-head">
        <div>
          <h2>Subscription Sources</h2>
          <p>Use raw `.txt` links for synced imports.</p>
        </div>
        <button id="refreshUrlsButton" class="btn btn-secondary btn-small">Refresh</button>
      </div>

      <div class="inline-form">
        <input type="text" id="urlInput" placeholder="Direct .txt URL">
        <button id="addUrlButton" class="btn btn-primary">Add</button>
      </div>

      <div id="fetchStatusBar" class="status-bar" hidden></div>
      <div id="fetchWarning" class="status-bar status-warning" hidden></div>

      <ul id="urlList" class="item-list"></ul>
    </section>
  </div>

  <input type="color" id="bgColorInput" class="color-picker-anchor" value="#ffff00" tabindex="-1" aria-hidden="true">
  <input type="color" id="textColorInput" class="color-picker-anchor" value="#ff0000" tabindex="-1" aria-hidden="true">

  <script src="popup.js"></script>
</body>

</html>
