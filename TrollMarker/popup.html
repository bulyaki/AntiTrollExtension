<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>FB Name Marker Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h2>Name Marker</h2>
  <div class="input-group">
    <input type="text" id="nameInput" placeholder="Enter name or profile link...">
    <button id="addButton">Add</button>
  </div>

  <div class="bulk-group">
    <textarea id="bulkInput" placeholder="Paste multiple names or links here (one per line)"></textarea>
    <div class="actions">
      <button id="bulkAddButton">Bulk Add</button>
    </div>
  </div>

  <div class="list-header">
    <h3>Tracked Items (<span id="itemCount">0</span>)</h3>
    <button id="clearAllButton" class="remove-all-btn">Clear All</button>
  </div>

  <ul id="nameList"></ul>
  <script src="popup.js"></script>
</body>

</html>
