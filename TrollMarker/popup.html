<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>FB Name Marker Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Name Marker</h1>
      <p class="subtitle">Highlight and track names on Facebook</p>
    </header>

    <section class="section">
      <h2>Appearance</h2>
      <div class="color-settings">
        <div class="color-row">
          <div class="color-control">
            <label for="bgColorInput">Background</label>
            <div class="color-input-wrapper">
              <input type="color" id="bgColorInput" value="#ffff00">
              <span class="color-value" id="bgColorValue">#ffff00</span>
            </div>
          </div>
          <div class="color-control">
            <label for="textColorInput">Text</label>
            <div class="color-input-wrapper">
              <input type="color" id="textColorInput" value="#ff0000">
              <span class="color-value" id="textColorValue">#ff0000</span>
            </div>
          </div>
        </div>
        <div class="opacity-control">
          <label for="bgOpacityInput">Opacity</label>
          <div class="slider-wrapper">
            <input type="range" id="bgOpacityInput" min="0" max="100" value="100">
            <span id="bgOpacityValue" class="slider-value">100%</span>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Add Names</h2>
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Enter name or profile link...">
        <button id="addButton" class="btn btn-primary">Add</button>
      </div>

      <div class="bulk-group">
        <textarea id="bulkInput" placeholder="Paste multiple names or links here (one per line)"></textarea>
        <button id="bulkAddButton" class="btn btn-success btn-full">Bulk Add</button>
      </div>
    </section>

    <section class="section">
      <div class="list-header">
        <h3>Tracked Names <span class="badge" id="itemCount">0</span></h3>
        <button id="clearAllButton" class="btn btn-danger btn-small">Clear All</button>
      </div>
      <ul id="nameList" class="item-list"></ul>
    </section>

    <section class="section">
      <h2>Subscription Links</h2>
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="Enter link to .txt file...">
        <button id="addUrlButton" class="btn btn-primary">Add URL</button>
      </div>

      <div class="list-header">
        <h3>Tracked URLs <span class="badge" id="urlCount">0</span></h3>
        <button id="refreshUrlsButton" class="btn btn-info btn-small">Refresh</button>
      </div>
      <ul id="urlList" class="item-list"></ul>
    </section>

    <div id="fetchStatusBar" class="status-bar status-success" style="display: none;"></div>
    <div id="fetchWarning" class="status-bar status-warning" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
